<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="formulario.css">
</head>
<body>

<header class="cabecalho">
    <h1>Contato</h1>

    <nav class="menu">
        <a href="Untitled-1.html">Home</a>
        <a href="Untitled-2.html">Cursos</a>
        <a href="Untitled-3.html">Contato</a>
    </nav>
</header>

<main>
    <section class="card">
        <form class="formulario">

            <label>Nome:</label>
            <input type="text">

            <label>Email:</label>
            <input type="email">

            <p>Você é:</p>
            <input type="radio" name="tipo"> Aluno
            <input type="radio" name="tipo"> Responsável

            <p>Interesses:</p>
            <input type="checkbox"> Cursos
            <input type="checkbox"> Turmas
            <input type="checkbox"> Matrícula

            <label>Mensagem:</label>
            <textarea rows="5"></textarea>

            <div class="botoes">
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </div>

        </form>
    </section>
</main>

<footer class="rodape">
    <p>Entre em contato conosco</p>
</footer>

</body>
</html>
